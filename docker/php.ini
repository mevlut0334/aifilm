; PHP Configuration for Docker Container
; Upload and POST settings
upload_max_filesize = 2048M
post_max_size = 2048M
max_file_uploads = 20

; Execution time settings
max_execution_time = 600
max_input_time = 600

; Memory settings
memory_limit = 512M

; Other useful settings
file_uploads = On
allow_url_fopen = On
