[global]
daemonize = no
log_level = warning

[www]
listen = 9000
listen.backlog = -1
user = www-data
group = www-data

; Process manager: dynamic (RAM optimizasyonu)
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.process_idle_timeout = 30s
pm.max_requests = 1000

; Timeout
request_terminate_timeout = 300

; Access log
access.log = /proc/self/fd/2
